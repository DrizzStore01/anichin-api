<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Anichin · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080a0f;
      --s1: #0f1118;
      --s2: #181c26;
      --s3: #1f2333;
      --border: #252d40;
      --blue: #4f8ef7;
      --green: #3dd68c;
      --red: #f25c5c;
      --yellow: #f5c542;
      --text: #dde3f0;
      --muted: #5a6580;
      --r: 12px;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Sora', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .logo {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--blue); }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--green);
      font-weight: 700;
    }
    .dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: .5; transform: scale(.8); }
    }

    .base-url-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 12px;
    }
    .base-url-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .base-url-val {
      font-size: 11px;
      color: var(--yellow);
      font-weight: 700;
      word-break: break-all;
      cursor: text;
      user-select: all;
    }

    /* ── MAIN LAYOUT ── */
    main {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── ENDPOINT CARD ── */
    .ep-card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color .2s;
    }
    .ep-card:focus-within { border-color: var(--blue); }

    .ep-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      flex-wrap: wrap;
    }

    .method-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(61,214,140,.15);
      color: var(--green);
      border: 1px solid rgba(61,214,140,.25);
      letter-spacing: .3px;
    }
    .method-badge.extract {
      background: rgba(79,142,247,.12);
      color: var(--blue);
      border-color: rgba(79,142,247,.25);
    }

    .ep-path {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
    }

    .ep-body {
      padding: 0 12px 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ep-input {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .2s;
    }
    .ep-input:focus { border-color: var(--blue); }
    .ep-input.sm { flex: 0 0 56px; min-width: 56px; }
    .ep-input:disabled { opacity: .4; cursor: not-allowed; }

    .go-btn {
      background: var(--blue);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      padding: 8px 16px;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
      flex-shrink: 0;
    }
    .go-btn:active { opacity: .8; transform: scale(.97); }
    .go-btn.ext { background: rgba(79,142,247,.2); border: 1px solid rgba(79,142,247,.4); color: var(--blue); }

    /* ── RESULT PANEL ── */
    #resultPanel {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      flex-wrap: wrap;
    }

    .result-route {
      font-size: 10px;
      color: var(--blue);
      font-weight: 700;
      word-break: break-all;
      flex: 1;
    }

    #statusBadge {
      font-size: 9px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--s3);
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    #statusBadge.ok { background: rgba(61,214,140,.12); color: var(--green); border: 1px solid rgba(61,214,140,.2); }
    #statusBadge.err { background: rgba(242,92,92,.12); color: var(--red); border: 1px solid rgba(242,92,92,.2); }
    #statusBadge.loading { background: rgba(245,197,66,.12); color: var(--yellow); border: 1px solid rgba(245,197,66,.2); }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .result-toolbar span { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    #copyBtn {
      background: var(--s3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      transition: border-color .15s;
    }
    #copyBtn:hover { border-color: var(--blue); color: var(--blue); }

    #jsonOutput {
      display: block;
      padding: 12px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--green);
      background: var(--bg);
      height: 320px;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    #jsonOutput::-webkit-scrollbar { width: 4px; }
    #jsonOutput::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── DESKTOP LAYOUT ── */
    @media (min-width: 700px) {
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
        align-items: start;
      }

      /* Endpoints take left col, result panel takes right col and spans all rows */
      #resultPanel {
        grid-column: 2;
        grid-row: 1 / 99;
        position: sticky;
        top: 14px;
      }

      #jsonOutput { height: 460px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="logo">ANICHIN<span>.SYS</span></div>
      <div class="status-dot"><div class="dot"></div> ONLINE</div>
    </div>
    <div class="base-url-box">
      <div class="base-url-label">Base URL</div>
      <div class="base-url-val">{{ app_url }}</div>
    </div>
  </header>

  <main>

    <!-- 1. HOME -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge">GET</span>
        <span class="ep-path">/donghua/home/&lt;page&gt;</span>
      </div>
      <div class="ep-body">
        <input class="ep-input sm" type="number" id="i_home" value="1" placeholder="Page" />
        <button class="go-btn" onclick="runTest('home')">GO</button>
      </div>
    </div>

    <!-- 2. SEARCH -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge">GET</span>
        <span class="ep-path">/donghua/search/&lt;query&gt;/&lt;page&gt;</span>
      </div>
      <div class="ep-body">
        <input class="ep-input" type="text" id="i_sq" value="soul land" placeholder="Query" />
        <input class="ep-input sm" type="number" id="i_sp" value="1" placeholder="Pg" />
        <button class="go-btn" onclick="runTest('search')">GO</button>
      </div>
    </div>

    <!-- 3. DETAIL -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge">GET</span>
        <span class="ep-path">/donghua/detail/&lt;slug&gt;</span>
      </div>
      <div class="ep-body">
        <input class="ep-input" type="text" id="i_detail" value="/anime/soul-land-2-the-unrivaled-tang-sect/" placeholder="Slug" />
        <button class="go-btn" onclick="runTest('detail')">GO</button>
      </div>
    </div>

    <!-- 4. EPISODE -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge">GET</span>
        <span class="ep-path">/donghua/episode/&lt;slug&gt;</span>
      </div>
      <div class="ep-body">
        <input class="ep-input" type="text" id="i_ep" value="/soul-land-2-the-unrivaled-tang-sect-episode-65-subtitle-indonesia/" placeholder="Slug" />
        <button class="go-btn" onclick="runTest('episode')">GO</button>
      </div>
    </div>

    <!-- 5. COMPLETED -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge">GET</span>
        <span class="ep-path">/donghua/completed/&lt;page&gt;</span>
      </div>
      <div class="ep-body">
        <input class="ep-input sm" type="number" id="i_comp" value="1" placeholder="Page" />
        <button class="go-btn" onclick="runTest('completed')">GO</button>
      </div>
    </div>

    <!-- 6. SCHEDULE -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge">GET</span>
        <span class="ep-path">/donghua/schedule</span>
      </div>
      <div class="ep-body">
        <input class="ep-input" value="Auto" disabled />
        <button class="go-btn" onclick="runTest('schedule')">GO</button>
      </div>
    </div>

    <!-- 7. RUMBLE EXTRACT -->
    <div class="ep-card">
      <div class="ep-header">
        <span class="method-badge extract">EXTRACT</span>
        <span class="ep-path">/donghua/extract/rumble</span>
      </div>
      <div class="ep-body">
        <input class="ep-input" type="text" id="i_rumble" value="https://rumble.com/embed/v5bkkx1/?pub=2li51c" placeholder="Rumble URL" />
        <button class="go-btn ext" onclick="runTest('rumble')">GO</button>
      </div>
    </div>

    <!-- RESULT PANEL -->
    <div id="resultPanel">
      <div class="result-header">
        <span class="result-route" id="activeRoute">—</span>
        <span id="statusBadge">Idle</span>
      </div>
      <div class="result-toolbar">
        <span>Response</span>
        <button id="copyBtn" onclick="copyJson()">Copy</button>
      </div>
      <pre id="jsonOutput">Pilih endpoint dan tekan GO.</pre>
    </div>

  </main>

  <script>
    const BASE = "{{ app_url }}";

    function runTest(type) {
      let endpoint = '';

      if (type === 'home') {
        endpoint = `/donghua/home/${document.getElementById('i_home').value}`;
      } else if (type === 'search') {
        const q = document.getElementById('i_sq').value;
        const p = document.getElementById('i_sp').value;
        endpoint = `/donghua/search/${encodeURIComponent(q)}/${p}`;
      } else if (type === 'detail') {
        endpoint = `/donghua/detail/${document.getElementById('i_detail').value}`;
      } else if (type === 'episode') {
        endpoint = `/donghua/episode/${document.getElementById('i_ep').value}`;
      } else if (type === 'completed') {
        endpoint = `/donghua/completed/${document.getElementById('i_comp').value}`;
      } else if (type === 'schedule') {
        endpoint = `/donghua/schedule`;
      } else if (type === 'rumble') {
        const url = encodeURIComponent(document.getElementById('i_rumble').value);
        endpoint = `/donghua/extract/rumble?url=${url}`;
      }

      fetchApi(endpoint);
    }

    async function fetchApi(endpoint) {
      const out = document.getElementById('jsonOutput');
      const badge = document.getElementById('statusBadge');
      const route = document.getElementById('activeRoute');

      route.textContent = endpoint;
      out.textContent = 'Loading...';
      out.style.color = 'var(--yellow)';
      badge.textContent = 'Fetching...';
      badge.className = 'loading';

      try {
        const t = Date.now();
        const res = await fetch(endpoint);
        const data = await res.json();
        const ms = Date.now() - t;

        out.textContent = JSON.stringify(data, null, 2);
        out.style.color = 'var(--green)';
        badge.textContent = `${res.status} OK · ${ms}ms`;
        badge.className = 'ok';
      } catch (e) {
        out.textContent = e.message;
        out.style.color = 'var(--red)';
        badge.textContent = 'Error';
        badge.className = 'err';
      }
    }

    function copyJson() {
      const text = document.getElementById('jsonOutput').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    }
  </script>
</body>
</html>
